<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>？？？的房间</title>

<style>
body{
  margin:0;
  background:#0b1a2a;
  color:#cfd6e0;
  font-family:"Noto Serif SC",serif;
  text-align:center;
}

/* 主体 */
.container{
  max-width:900px;
  margin:80px auto;
  padding:40px 20px;
}

/* 标题 */
.title{
  color:#e0b84f;
  font-size:28px;
  letter-spacing:4px;
  margin-bottom:20px;
}

/* 分割线 */
.hr{
  margin:30px auto;
  height:1px;
  width:90%;
  background:linear-gradient(to right,transparent,#aaa,transparent);
}

/* 文本 */
.text{
  margin:12px 0;
  line-height:1.8;
  opacity:0.85;
}

/* 按钮 */
.enter-btn{
  display:inline-block;
  margin-top:30px;
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  transition:0.25s;
}

/* hover 不改变风格，只加强 */
.enter-btn:hover{
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 12px rgba(255,255,255,0.25);
}

/* 轻微呼吸感 */
.enter-btn:active{
  transform:scale(0.96);
}

/* 闪烁（非常轻） */
.fade{
  animation:fade 4s infinite;
}
@keyframes fade{
  0%,100%{opacity:0.85}
  50%{opacity:0.5}
}
</style>
</head>

<body>

<div class="container">

<div class="title">“？？？”的房间</div>

<div class="text fade">“嘘——”</div>

<div class="hr"></div>

<div class="text">……</div>

<div class="text">“嘘，保持沉默。”</div>

<div class="text">“那些‘目光’随时会注意到你。沉默、感受、理解——你能够理解一切。”</div>

<div class="text">“你知道你是谁。我也知道，‘祂’亦是。”</div>

<div class="text">“但无妨，‘约定’已立下，「摇篮」将记你的名。”</div>

<div class="text">“在缄默中聆听回响，那是门即将开启的声音——”</div>

<div class="text">……</div>

<div class="hr"></div>

<a href="https://www.wolai.com/thefinalcanaan/fBen4jocewJ7GPZtuiDy9A"
   target="_blank"
   rel="noopener"
   class="enter-btn">
【进入？？？的房间】
</a>

</div>

</body>
</html>
