<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>？？？的房间</title>

<style>
body{
  margin:0;
  background:#0b1a2a;
  color:#cfd6e0;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC","SimHei",sans-serif;
  text-align:center;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px 20px 40px;
}

.title{
  color:#e0b84f;
  font-size:36px;
  font-weight:700;
  letter-spacing:6px;
  margin-bottom:18px;
}

.hr{
  margin:24px auto;
  height:1px;
  width:90%;
  background:linear-gradient(to right,transparent,#aaa,transparent);
}

.text{
  margin:10px 0;
  line-height:1.9;
  color:#98a2ad;
  font-style:italic;
}

.system{
  color:#7c8591;
  font-style:italic;
  margin:16px 0;
}

.enter-btn{
  display:inline-block;
  margin-top:26px;
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  transition:0.25s;
  font-style:normal;
}

.enter-btn:hover{
  background:rgba(255,255,255,0.08);
  box-shadow:0 0 12px rgba(255,255,255,0.25);
}

.enter-btn:active{
  transform:scale(0.96);
}

/* ===== 银白动态“歌”——修正版 ===== */
.chant{
  margin:40px 0 10px;
}

/* 通用（两行统一） */
.chant-title,
.chant-text{
  font-style:italic;
  font-weight:700;          /* ← 两行都加粗 */
  line-height:1.8;          /* ← 恢复行距 */
  letter-spacing:1px;

background:linear-gradient(
  90deg,
  #b8c4d9 0%,
  #dfe9ff 25%,
  #8fa3c8 50%,
  #dfe9ff 75%,
  #b8c4d9 100%
);

  background-size:200% 100%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:shine 6s linear infinite;  /* ← 放慢一点 */

  text-shadow:0 0 6px rgba(255,255,255,0.08); 
}

/* 第一行（标题更大） */
.chant-title{
  font-size:24px;
  margin-bottom:12px;
}

/* 第二行（稍小但更“厚”） */
.chant-text{
  font-size:18px;
}

/* 动态渐变 */
@keyframes shine{
  0%{ background-position:0% 50%; }
  100%{ background-position:200% 50%; }
}
</style>

</head>

<body>

<div class="container">

<div class="title">“？？？”的房间</div>

<div class="text system">“嘘——”</div>

<div class="hr"></div>

<div class="text">……</div>

<div class="text">“嘘，保持沉默。”</div>

<div class="text">“那些‘目光’随时会注意到你。沉默、感受、理解——你能够理解一切。”</div>

<div class="text">“你知道你是谁。我也知道，‘祂’亦是。”</div>

<div class="text">“但无妨，‘约定’已立下，「摇篮」将记你的名。”</div>

<div class="text">“在缄默中聆听回响，那是门即将开启的声音——”</div>

<div class="text">……</div>

<div class="hr"></div>

<div class="chant">
  <div class="chant-title">一之歌：皆需聆听母亲与兄长之教诲。</div>
  <div class="chant-text">
    天有屏帷，摇篮有诫，先民有血，而吾亦有一言——
  </div>
</div>

<a href="https://www.wolai.com/thefinalcanaan/fBen4jocewJ7GPZtuiDy9A"
target="_blank"
rel="noopener"
class="enter-btn">

</div>

</body>
</html>
