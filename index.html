<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sabbath II - 时与砂</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Noto+Serif+SC:wght@600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#060b16;
  --bg2:#0b1626;
  --gold:#d4b448;
  --silver:#dfe6f8;
}

html,body{
  margin:0;padding:0;height:100%;
  font-family:"Microsoft YaHei","PingFang SC","Heiti SC","SimHei",sans-serif;
  overflow:hidden;
}

body{
  background:linear-gradient(180deg,#060b16,#0b1626);
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(1200px 800px at 20% 10%, #0f274a 0%, transparent 60%),
    radial-gradient(1000px 700px at 80% 90%, #142f52 0%, transparent 60%);
  z-index:-2;
}

/* ===== 星空 ===== */
.stars{position:absolute;inset:0;}
.star{
  position:absolute;border-radius:50%;
  background:white;
  opacity:.8;
  animation:twinkle infinite ease-in-out alternate;
}
@keyframes twinkle{from{opacity:.3;}to{opacity:1;}}

/* ===== 流星 ===== */
.meteor{
  position:absolute;
  width:120px;
  height:2px;
  background:linear-gradient(
    90deg,
    rgba(255,255,255,1),
    rgba(255,255,255,.6),
    rgba(255,255,255,0)
  );
  border-radius:2px;
  transform:rotate(35deg);
  filter:blur(0.6px);
}
.meteor::before{
  content:"";
  position:absolute;
  right:0;
  top:-2px;
  width:6px;height:6px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 6px white,0 0 12px white,0 0 18px rgba(255,255,255,.6);
}

/* ===== 顶部光 ===== */
.top-glow{
  position:absolute;top:0;left:0;width:100%;height:50vh;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.12),transparent 70%);
  filter:blur(60px);
  opacity:.6;
}

/* ===== 布局 ===== */
.wrap{
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== 卡片（漂浮但不干扰logo） ===== */
.card{
  text-align:center;
  background:rgba(10,14,22,.5);
  padding:1.8rem;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,0,0,.4);
  max-width:480px;

  animation:float 6s ease-in-out infinite, cardIn 1.8s ease-out forwards;
}

/* ⭐ 改这里：不用 transform */
@keyframes float{
  0%,100%{ margin-top:0; }
  50%{ margin-top:-14px; }
}

@keyframes cardIn{
  0%{ box-shadow:0 0 0 rgba(212,180,72,0); }
  60%{ box-shadow:0 0 30px rgba(212,180,72,.25); }
  100%{ box-shadow:0 0 40px rgba(0,0,0,.4); }
}

/* ===== LOGO（入场，不会消失） ===== */
.logo{
  width:120px;
  margin-bottom:1rem;

  opacity:0;
  transform:scale(0.8);

  animation:logoIn 1.8s ease-out forwards;
}

@keyframes logoIn{
  0%{
    opacity:0;
    transform:scale(0.8);
    filter:blur(6px);
  }
  60%{
    opacity:1;
    transform:scale(1.05);
    filter:blur(0);
  }
  100%{
    transform:scale(1);
  }
}

/* ===== 标题 ===== */
h1{
  color:var(--gold);
  font-size:clamp(32px,4.5vw,56px);
  font-weight:700;
  margin:0 0 1rem;
  text-shadow:0 0 18px rgba(212,180,72,.45);
  animation:titleBreath 6s ease-in-out infinite alternate;
}

.title-en{font-family:"Cinzel", serif;}
.title-cn{font-family:"Noto Serif SC", serif;}

@keyframes titleBreath{
  0%{ transform:scale(1); text-shadow:0 0 15px rgba(212,180,72,.35);}
  100%{ transform:scale(1.02); text-shadow:0 0 28px rgba(212,180,72,.5);}
}

/* ===== 副标题 ===== */
.sub{
  color:var(--silver);
  margin:0 0 1.4rem;
  text-shadow:0 0 12px rgba(223,230,248,.6);
}

/* ===== 按钮（呼吸） ===== */
.enter-btn{
  display:inline-block;
  margin-top:2.4rem;
  padding:.7rem 1.8rem;
  color:var(--gold);
  border:1px solid rgba(212,180,72,.6);
  border-radius:10px;
  text-decoration:none;
  font-weight:600;

  animation:btnBreath 3.5s ease-in-out infinite;
}

@keyframes btnBreath{
  0%,100%{ box-shadow:0 0 6px rgba(212,180,72,.15); }
  50%{ box-shadow:0 0 18px rgba(212,180,72,.4); }
}

.enter-btn:hover{
  background:rgba(212,180,72,.08);
  box-shadow:0 0 14px rgba(212,180,72,.35);
}
</style>

</head>

<body>

<div class="stars" id="stars"></div>
<div class="top-glow"></div>

<div class="wrap">
  <section class="card">
    <img class="logo" src="assets/logo.svg" alt="Logo"/>
    <h1>
      <span class="title-en">TheSabbathⅡ</span><br>
      <span class="title-cn">时与砂</span>
    </h1>
    <p class="sub">“The Eternal Feminine draws us onward.”</p>
    <a class="enter-btn" href="dream.html">【进入梦境】</a>
  </section>
</div>

<script>
const stars = document.getElementById("stars");
for(let i=0;i<100;i++){
  const s=document.createElement("div");
  s.className="star";
  const size=Math.random()*2+0.5;
  s.style.width=size+"px";
  s.style.height=size+"px";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(Math.random()*4+3)+"s";
  stars.appendChild(s);
}

function createMeteor(){
  const m=document.createElement("div");
  m.className="meteor";

  const startX=Math.random()*window.innerWidth;
  const startY=Math.random()*200;

  m.style.left=startX+"px";
  m.style.top=startY+"px";

  document.body.appendChild(m);

  m.animate([
    { transform:`translate(0,0) rotate(35deg)`, opacity:1 },
    { transform:`translate(${220+Math.random()*120}px,${420+Math.random()*200}px) rotate(35deg)`, opacity:0 }
  ],{
    duration:6000+Math.random()*3000,
    easing:"cubic-bezier(0.2,0.6,0.2,1)"
  });

  setTimeout(()=>m.remove(),3000);
}

createMeteor();

function loopMeteor(){
  if(Math.random()>0.75){
    createMeteor();
  }
  setTimeout(loopMeteor, 2000 + Math.random()*3000);
}
loopMeteor();
</script>

</body>
</html>
